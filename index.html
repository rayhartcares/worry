<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overcome Worry — Brave Feelings Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════
       PASSWORD GATE
  ══════════════════════════════════════ -->
  <div id="passwordGate" class="gate-overlay">
    <div class="gate-card">
      <div class="gate-emblem" aria-hidden="true">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="26" cy="26" r="24" stroke="url(#goldRing)" stroke-width="1.5" fill="none"/>
          <circle cx="26" cy="26" r="18" stroke="rgba(201,168,76,0.25)" stroke-width="1" fill="none"/>
          <path d="M26 36 C26 36 14 28 14 20 C14 15.6 17.6 12 22 12 C24 12 25.5 13 26 14 C26.5 13 28 12 30 12 C34.4 12 38 15.6 38 20 C38 28 26 36 26 36Z" fill="url(#goldHeart)" opacity="0.90"/>
          <defs>
            <linearGradient id="goldRing" x1="0" y1="0" x2="52" y2="52" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#b8942e"/><stop offset="50%" stop-color="#e8c96a"/><stop offset="100%" stop-color="#C9A84C"/>
            </linearGradient>
            <linearGradient id="goldHeart" x1="14" y1="12" x2="38" y2="36" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#e8c96a"/><stop offset="100%" stop-color="#9a7020"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="gate-brand">BRAVE FEELINGS LAB</div>
      <h1 class="gate-title">Brave Feelings: Worry Portal</h1>
      <p class="gate-sub">worry.bravefeelings.com &mdash; Enter your access code to begin.</p>
      <div class="gate-field-wrap">
        <input
          id="passwordInput"
          type="password"
          class="gate-input"
          placeholder="Access code"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="passwordToggle" class="gate-toggle" aria-label="Show password" type="button">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div id="gateError" class="gate-error" aria-live="polite"></div>
      <button id="gateSubmit" class="gate-btn" type="button">Enter Program</button>
      <p class="gate-hint">Access code provided by your counselor or teacher.</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       MAIN APP (hidden until unlocked)
  ══════════════════════════════════════ -->
  <div id="app" class="app-hidden">

    <!-- Top bar -->
    <header class="top-bar">
      <div class="top-bar-left" style="width:40px;"></div>
      <div class="top-bar-center">
        <div class="progress-rail" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="step-label" id="stepLabel" aria-live="polite"></div>
      </div>
      <div class="top-bar-right">
        <button id="menuToggle" class="menu-toggle" aria-label="Open program menu" aria-expanded="false">
          <span class="hamburger-bar"></span>
          <span class="hamburger-bar"></span>
          <span class="hamburger-bar"></span>
        </button>
      </div>
    </header>

    <!-- Hamburger side panel -->
    <aside id="sideMenu" class="side-menu" aria-hidden="true" aria-label="Program menu">
      <div class="side-menu-header">
        <span class="side-menu-title">Program Menu</span>
        <button id="menuClose" class="menu-close" aria-label="Close menu">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M4 4l10 10M14 4L4 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="side-menu-jump">
        <label class="jump-label" for="jumpSelect">GO TO PAGE</label>
        <select id="jumpSelect" class="jump-select"></select>
        <button id="jumpBtn" class="jump-btn">Go</button>
      </div>

      <nav class="side-menu-nav">
        <ul id="menuPageList" class="menu-page-list"></ul>
      </nav>

      <div class="side-menu-actions">
        <button id="btnRestart" class="action-btn action-btn--neutral">Restart Program</button>
        <button id="btnLogOff"  class="action-btn action-btn--neutral">Log Off</button>
        <button id="btnExit"    class="action-btn action-btn--danger">Exit &amp; Reset Progress</button>
      </div>
    </aside>

    <!-- Backdrop for menu -->
    <div id="menuBackdrop" class="menu-backdrop"></div>

    <!-- Screens -->
    <main class="screen-container" id="screenContainer"></main>

    <!-- Benne Hart guidance bar -->
    <div class="benne-bar" id="benneBar" aria-live="polite">
      <div class="benne-bar-inner">
        <div class="benne-bar-avatar">
          <img src="assets/images/benne-hart-avatar.webp" alt="Benne Hart"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
          <div class="benne-bar-avatar-fallback" style="display:none;">B</div>
        </div>
        <div class="benne-bar-content">
          <span class="benne-bar-label">BENNE HART SAYS</span>
          <p class="benne-bar-note" id="benneNote"></p>
        </div>
      </div>
    </div>

    <!-- Bottom nav -->
    <nav class="bottom-nav" id="bottomNav">
      <button class="nav-btn nav-btn--back" id="btnBack" aria-label="Previous screen">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M11 14L6 9l5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back
      </button>
      <div class="nav-dots" id="navDots" aria-hidden="true"></div>
      <button class="nav-btn nav-btn--next" id="btnNext" aria-label="Next screen">
        Next
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M7 4l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </nav>

  </div><!-- /#app -->

  <script src="script.js"></script>
</body>
</html>
